<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - WanderNest</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Menu Button -->
<div class= "menu-btn" onclick="toggleMenu()">☰</div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">

    <h2>WanderNest</h2>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="experiences.html">Experiences</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

</aside>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- GALLERY -->
<section class="gallery">

    <div class="section-title">
        <h2>Explore Our Travel Gallery</h2>
        <p>A glimpse of the world's most beautiful destinations.</p>
    </div>

    <div class="slider">

        <div class="prev" onclick="prevSlide()">❮</div>

        <img id="slide" src="images/gallery1.jpg" alt="Gallery Image">

        <div class="next" onclick="nextSlide()">❯</div>

    </div>

    <div class="caption" id="caption">Paris</div>

    <div class="dots">

        <span class="dot active" onclick="showSlide(0)"></span>
        <span class="dot" onclick="showSlide(1)"></span>
        <span class="dot" onclick="showSlide(2)"></span>
        <span class="dot" onclick="showSlide(3)"></span>
        <span class="dot" onclick="showSlide(4)"></span>
        <span class="dot" onclick="showSlide(5)"></span>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
