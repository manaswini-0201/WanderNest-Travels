<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | WanderNest Travels</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menu -->
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <h2>🌍 WanderNest</h2>

        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="about.html">ℹ️ About</a>
            <a href="experiences.html">✈️ Experiences</a>
            <a href="gallery.html">🖼 Gallery</a>
            <a href="contact.html">📞 Contact</a>
        </nav>

    </aside>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Gallery -->

    <section class="gallery">

        <div class="section-title hidden">
            <h2>Travel Gallery</h2>
            <p>Explore beautiful moments from our destinations</p>
        </div>

        <div class="slider hidden">

            <div class="prev" onclick="prevSlide()">❮</div>

            <img id="slide" src="images/gallery1.jpg" alt="Gallery">

            <div class="next" onclick="nextSlide()">❯</div>

        </div>

        <div class="caption hidden" id="caption">
            Paris
        </div>

        <div class="dots">

            <span class="dot active" onclick="showSlide(0)"></span>

            <span class="dot" onclick="showSlide(1)"></span>

            <span class="dot" onclick="showSlide(2)"></span>

            <span class="dot" onclick="showSlide(3)"></span>

            <span class="dot" onclick="showSlide(4)"></span>

            <span class="dot" onclick="showSlide(5)"></span>

        </div>

    </section>

    <footer>

        <h2>🌍 WanderNest Travels</h2>

        <p>Explore • Dream • Discover</p>

        <p>© 2026 WanderNest Travels. All Rights Reserved.</p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
